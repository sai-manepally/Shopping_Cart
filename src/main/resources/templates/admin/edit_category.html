<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeLeaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<section>
    <div class="container-fluid p-5 mt-5">
        <div class="row">
            <div class="col-md-3">
                <div class="card card-sh">
                    <div class="card-header text-center">
                        <p class="fs-4">Edit category </p>
                        <th:block th:if="${session.succMsg}">
                            <p class="text-success fw-bold">[[${session.succMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>

                        <th:block th:if="${session.errorMsg}">
                            <p class="text-success fw-bold">[[${session.errorMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>

                    </div>
                    <div class="card-body">
                        <form action="/admin/saveCategory" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label> Enter Category</label><input type="text" name="name" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label> Status</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" checked value="true"  name="isActive" id="flexRadioDefault1">
                                    <label class="form-check-label" for="flexRadioDefault1">
                                        Active
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" value="false" name="isActive" id="flexRadioDefault2" >
                                    <label class="form-check-label" for="flexRadioDefault2">
                                        Inactive
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label> Upload Image</label><input type="file" name="file" class="form-control">
                            </div>
                            <button class="btn btn-primary col-md12 mt-2">Save</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card card-sh">
                    <div class="card-header text-center fs-4">Category Details</div>
                    <div class="card-body">
                    </div><table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Sl no</th>
                        <th scope="col">Category</th>
                        <th scope="col">Status</th>
                        <th scope="col">Image</th>
                        <th scope="col">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat, c : ${categorys}">
                        <th scope="row">[[${c.count}]]</th>
                        <td>[[${cat.name}]]</td>
                        <td>[[${cat.isActive}]]</td>
                        <td><img th:src="@{'/img/category_img/'+${cat.imageName}}" width="50px" height="50px"></td>
                        <td>
                            <a href="/admin/loadEditCategory" class="btn btn-primary"><i class="fa-solid fa-pen-to-square "></i>Edit</a>
                            <a href="#" class="btn btn-danger"><i class="fa-solid fa-trash"></i>Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
